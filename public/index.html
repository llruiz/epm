<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monografia</title>

<style>
:root {
    --bg: #f1f5f9;
    --header: #0f172a;
    --tab: #1e293b;
    --tab-hover: #334155;
    --active: #2563eb;
    --text: #e2e8f0;
}

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, -apple-system, Segoe UI, sans-serif;
}

body {
    background: var(--bg);
}

/* HEADER */
header {
    position: fixed;
    top: 0;
    width: 100%;
    background: var(--header);
    color: var(--text);
    padding: 10px 16px;
    z-index: 999;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

/* TOPBAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.topbar h1 {
    font-size: 0.95rem;
    font-weight: 600;
}

/* TABS */
.tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}

.tab {
    padding: 6px 10px;
    border-radius: 6px;
    background: var(--tab);
    cursor: pointer;
    font-size: 0.8rem;
    transition: 0.2s;
}

.tab:hover {
    background: var(--tab-hover);
}

.tab.active {
    background: var(--active);
    color: white;
    font-weight: 600;
}

/* CONTENT */
.main {
    margin-top: 70px;
    height: calc(100vh - 70px);
    position: relative;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
    opacity: 0;
    transition: opacity 0.2s ease;
}

iframe.active {
    display: block;
    opacity: 1;
}

/* LOADER */
.loader {
    position: absolute;
    inset: 0;
    background: rgba(15,23,42,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 0.9rem;
    z-index: 10;
    visibility: hidden;
}

.loader.show {
    visibility: visible;
}
</style>
</head>

<body>

<header>
    <div class="topbar">
        <h1>Monografia</h1>
        <span style="font-size:0.7rem; opacity:0.6;">
            Ctrl + 1 / 2 / 3 / 4
        </span>
    </div>

    <nav class="tabs" id="tabs"></nav>
</header>

<div class="main">
    <div class="loader" id="loader">Carregando...</div>

    <iframe id="farol" src="diretrizes.html"></iframe>
    <iframe id="lab" src="laboratorio.html"></iframe>
    <iframe id="extrator" src="extrator.html"></iframe>
    <iframe id="arquiteto" src="arquiteto.html"></iframe>
</div>

<script>
/* CONFIG CENTRAL */
const CONFIG = [
    { id: "farol", nome: "Diretrizes" },
    { id: "lab", nome: "Laboratório" },
    { id: "extrator", nome: "Extrator" },
    { id: "arquiteto", nome: "Arquiteto" }
];

const tabsContainer = document.getElementById("tabs");
const frames = document.querySelectorAll("iframe");
const loader = document.getElementById("loader");

/* CRIA ABAS DINAMICAMENTE */
CONFIG.forEach((item, index) => {
    const tab = document.createElement("div");
    tab.className = "tab";
    tab.textContent = item.nome;
    tab.dataset.id = item.id;

    tab.addEventListener("click", () => ativar(item.id));
    tabsContainer.appendChild(tab);
});

/* FUNÇÃO PRINCIPAL */
function ativar(id) {
    loader.classList.add("show");

    setTimeout(() => {
        frames.forEach(f => f.classList.remove("active"));
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));

        document.getElementById(id).classList.add("active");
        document.querySelector(`[data-id="${id}"]`).classList.add("active");

        localStorage.setItem("socratis_aba", id);

        loader.classList.remove("show");
    }, 180);
}

/* RESTAURA ESTADO */
window.addEventListener("load", () => {
    const saved = localStorage.getItem("socratis_aba") || "farol";
    ativar(saved);
});

/* HOTKEYS */
document.addEventListener("keydown", (e) => {
    if (!e.ctrlKey) return;

    const mapa = {
        "1": "farol",
        "2": "lab",
        "3": "extrator",
        "4": "arquiteto"
    };

    if (mapa[e.key]) {
        e.preventDefault();
        ativar(mapa[e.key]);
    }
});
</script>

</body>
</html>
