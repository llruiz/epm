<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPM | Estruturador de Monografias</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

    <div id="auth-modal">
        <div class="auth-card">
            <h2>EPM <span style="color:var(--primary)">—</span></h2>
            <p style="font-size: 10px; color: #64748b; margin-bottom: 30px;">ACESSO RESTRITO</p>
            <input type="password" id="modalKey" placeholder="Gemini API Key">
            <button class="btn-primary" id="btnVerify" onclick="verificarKey()">Acessar Sistema</button>
            <p id="auth-error" style="color:#ef4444; font-size: 10px; margin-top: 15px; display: none;">CHAVE INVÁLIDA</p>
        </div>
    </div>

    <div id="main-content" class="main-content locked">
        <header>
            <div>
                <h1 style="font-size: 2.5rem;">EPM <span style="color:var(--primary)">—</span></h1>
                <p style="color: var(--text-dim); font-size: 12px;">MONOGRAFIA ACADÊMICA</p>
            </div>
            <div style="color: var(--success); font-size: 10px; font-weight: bold;">● SISTEMA ONLINE</div>
        </header>

        <section id="section-1" class="card-step">
            <p style="font-size: 10px; font-weight: bold; color: var(--text-dim); margin-bottom: 20px;">ETAPA 01 - ÁREA</p>
            <div class="grid-selection">
                <div class="selectable-card" onclick="selectArea('Direito de Família', this)">
                    <h4 style="margin-bottom: 10px;">Direito de Família</h4>
                    <p style="font-size: 11px; color: var(--text-dim);">Relações existenciais e novas entidades.</p>
                </div>
                <div class="selectable-card" onclick="selectArea('Direito das Sucessões', this)">
                    <h4 style="margin-bottom: 10px;">Direito das Sucessões</h4>
                    <p style="font-size: 11px; color: var(--text-dim);">Patrimônio e herança digital.</p>
                </div>
            </div>
        </section>

        <section id="section-2" class="card-step" style="opacity: 0.3; pointer-events: none;">
            <select id="subtema" style="width: 100%; padding: 15px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 12px; margin-bottom: 20px;">
                <option value="">Selecione a área acima...</option>
            </select>
            <button class="btn-primary" onclick="gerarGargalos()" id="btnGargalos">Mapear Gargalos</button>
        </section>

        <section id="section-3" class="card-step" style="display: none; border-color: var(--primary);"></section>

        <section id="section-4" class="card-step" style="display: none;">
            <textarea id="pergunta" placeholder="Sua pergunta de pesquisa..." style="width: 100%; height: 100px; background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px;"></textarea>
            <button class="btn-success" onclick="finalizarEtapa()" id="btnFinal">Validar e Gerar Relatório</button>
        </section>

        <div id="final-output" class="card-step prose-result" style="display: none;"></div>
    </div>

    <script>
        // Use a mesma lógica de JavaScript que você já tem, 
        // apenas garantindo que a variável apiKey seja preenchida na função verificarKey()
        let apiKey = "";
        let selecao = { area: '', subtema: '', gargalo: '' };

        async function verificarKey() {
            const keyInput = document.getElementById('modalKey').value.trim();
            if(!keyInput) return;
            document.getElementById('btnVerify').innerText = "VERIFICANDO...";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${keyInput}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "ping" }] }] })
                });

                if (response.ok) {
                    apiKey = keyInput;
                    document.getElementById('auth-modal').style.display = 'none';
                    document.getElementById('main-content').classList.remove('locked');
                } else { throw new Error(); }
            } catch (e) {
                document.getElementById('auth-error').style.display = 'block';
                document.getElementById('btnVerify').innerText = "Acessar Sistema";
            }
        }

        // Funções selectArea, gerarGargalos e finalizarEtapa (copie do código anterior que já funcionava)
        // ...
    </script>
</body>
</html>
