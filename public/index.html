<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Meu Buscador Acadêmico</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 800px; margin: auto; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; }
        #resultados { border: 1px solid #ccc; padding: 10px; margin-top: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>Pesquisa Acadêmica Inteligente</h2>
    <input type="password" id="geminiKey" placeholder="Cole aqui sua chave Gemini (API KEY)">
    <input type="text" id="termo" placeholder="Ex: Eficácia das decisões do STF em controle concentrado">
    <button onclick="pesquisar()">Pesquisar e Analisar</button>
    
    <div id="resultados">Os resultados aparecerão aqui...</div>

    <script>
        async function pesquisar() {
            const term = document.getElementById('termo').value;
            const key = document.getElementById('geminiKey').value;
            const resDiv = document.getElementById('resultados');
            
            resDiv.innerText = "Buscando na USP e SciELO...";

            // 1. Acessa a nossa 'Ponte' para evitar bloqueio
            const proxyUrl = `/api/search?url=https://www.teses.usp.br/teses/oai.php?verb=ListRecords&metadataPrefix=oai_dc`;
            const response = await fetch(proxyUrl);
            const xmlData = await response.text();

            resDiv.innerText = "Gemini analisando os dados...";

            // 2. Envia para o Gemini organizar
            const geminiRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                body: JSON.stringify({
                    contents: [{ parts: [{ text: `Abaixo está um XML de teses da USP. Filtre e liste apenas as que falam sobre "${term}": ${xmlData.substring(0, 5000)}` }]}]
                })
            });
            
            const finalData = await geminiRes.json();
            resDiv.innerText = finalData.candidates[0].content.parts[0].text;
        }
    </script>
</body>
</html>
